<title>階段 3 - 基礎設施即程式碼 | IBM Bob SDLC 示範</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme.css">

<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f9fa;
    --surface2: #e9ecef;
    --border: #dee2e6;
    --accent: #0066cc;
    --accent2: #00a896;
    --warn: #ff8c00;
    --text: #212529;
    --muted: #495057;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .meta {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .meta span { color: #000000; }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .home-link:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  
  /* LAYOUT */
  .main-layout {
    display: flex;
    flex: 1;
    position: relative;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 51px;
    height: calc(100vh - 51px);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .toc-list {
    list-style: none;
  }

  .toc-item {
    margin-bottom: 2px;
  }

  .toc-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    text-decoration: none;
    color: var(--muted);
    font-size: 12px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }

  .toc-link:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .toc-link.active {
    background: var(--surface2);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .toc-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    min-width: 24px;
  }

  .toc-label {
    flex: 1;
    line-height: 1.4;
  }

  .toc-optional {
    opacity: 0.6;
    font-size: 11px;
  }

  /* CONTENT */
  .container {flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    overflow-y: auto;
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .sidebar {
      display: none;
    }
  }

  /* Original container styles below */
  .old-container-placeholder {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    flex: 1;
  }

  .stage-header {
    margin-bottom: 30px;
  }

  .stage-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .stage-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .stage-desc {
    font-size: 16px;
    color: var(--muted);
  }

  
  .tp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(0,102,204,0.2);
  }

  .tp-icon {
    font-size: 16px;
  }

  .tp-label {
    
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .talking-point {
    background: linear-gradient(135deg, rgba(0,102,204,0.05), rgba(0,168,150,0.03));
    border: 1px solid rgba(0,102,204,0.3);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.7;
  }

  .tp-list {
    list-style: none;
    padding-left: 0;
  }

  .tp-list li {
    margin-bottom: 10px;
    padding-left: 20px;
    position: relative;
  }

  .tp-list li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 25px 0 15px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .prompt-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 15px;
    overflow: hidden;
  }

  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(0,0,0,0.02);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .prompt-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }

  .prompt-body {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #495057;
    padding: 14px;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.02);
    display: none;
    max-height: 400px;
    overflow-y: auto;
  }

  .prompt-body.visible {
    display: block;
  }

  .prompt-toggle {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .prompt-toggle.open {
    transform: rotate(180deg);
  }

  .copy-btn {
    padding: 4px 10px;
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: var(--accent2);
  }

  
  .note-header, .tip-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,168,150,0.2);
  }

  .tip-header {
    border-bottom-color: rgba(255,140,0,0.2);
  }

  .note-icon, .tip-icon {
    font-size: 16px;
  }

  .note-label, .tip-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .note-label {
    color: var(--accent2);
  }

  .tip-label {
    color: var(--warn);
  }

  .stage-note {
    background: rgba(0,168,150,0.08);
    border: 1px solid rgba(0,168,150,0.3);
    border-left: 3px solid var(--accent2);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 15px 0;
    font-size: 12px;
    line-height: 1.6;
  }

  .stage-tip {
    background: rgba(255,140,0,0.08);
    border: 1px solid rgba(255,140,0,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 15px 0;
    font-size: 11px;
    line-height: 1.6;
    color: #000000;
  }

  .stage-prep {
    background: rgba(255,85,85,0.08);
    border: 1px solid rgba(255,85,85,0.25);
    border-left: 3px solid var(--red);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 15px 0;
    font-size: 12px;
    line-height: 1.6;
  }

  .output-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .output-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
  }

  .output-icon {
    color: #000000;
    flex-shrink: 0;
  }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    padding: 10px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-block;
  }

  .nav-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
</style>

  <script>
    function togglePrompt(header) {
      const body = header.nextElementSibling;
      const toggle = header.querySelector('.prompt-toggle');
      body.classList.toggle('visible');
      toggle.classList.toggle('open');
    }

    function copyPrompt(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('Prompt copied to clipboard!');
      });
    }

    // Auto-open first prompt
    document.addEventListener('DOMContentLoaded', () => {
      const firstBody = document.querySelector('.prompt-body');
      const firstToggle = document.querySelector('.prompt-toggle');
      if (firstBody) {
        firstBody.classList.add('visible');
        firstToggle.classList.add('open');
      }
    });
  </script>
