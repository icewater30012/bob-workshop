<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回饋查詢 - 車站管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 深色模式開關 -->
    <div class="dark-mode-toggle">
        <button id="darkModeToggle" class="btn btn-sm btn-outline-secondary" title="切換深色模式">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <!-- 頂部導航列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-train-front-fill"></i> 捷運車站管理系統
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house-fill"></i> 車站管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="feedback.html">
                            <i class="bi bi-chat-dots-fill"></i> 回饋查詢
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- 標題 -->
        <div class="text-center mb-4">
            <h1 class="display-4">💬 回饋查詢</h1>
            <p class="lead text-muted">Passenger Feedback Management</p>
        </div>

        <!-- 回饋統計 -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-bar-chart-fill"></i> 回饋統計
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="feedbackStats" class="row">
                            <div class="col-md-12 text-center">
                                <div class="spinner-border spinner-border-sm" role="status">
                                    <span class="visually-hidden">載入中...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 篩選與搜尋 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-funnel-fill"></i> 篩選條件
                </h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="filterStation" class="form-label">車站</label>
                        <select class="form-select" id="filterStation">
                            <option value="">所有車站</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="filterRating" class="form-label">評分</label>
                        <select class="form-select" id="filterRating">
                            <option value="">所有評分</option>
                            <option value="5">⭐⭐⭐⭐⭐ (5星)</option>
                            <option value="4">⭐⭐⭐⭐ (4星)</option>
                            <option value="3">⭐⭐⭐ (3星)</option>
                            <option value="2">⭐⭐ (2星)</option>
                            <option value="1">⭐ (1星)</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-primary w-100" id="applyFilter">
                            <i class="bi bi-search"></i> 套用篩選
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 回饋列表 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-chat-dots-fill"></i> 回饋列表
                </h5>
                <span class="badge bg-dark" id="feedbackCount">0 筆回饋</span>
            </div>
            <div class="card-body">
                <div id="feedbackList">
                    <div class="text-center text-muted">
                        <div class="spinner-border spinner-border-sm me-2" role="status">
                            <span class="visually-hidden">載入中...</span>
                        </div>
                        載入回饋資料中...
                    </div>
                </div>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer class="text-center mt-5 mb-3 text-muted">
            <p>© 2024 捷運系統公司 | IBM Bob Workshop - Feedback System</p>
        </footer>
    </div>

    <!-- 懸浮提交回饋按鈕 -->
    <button class="floating-feedback-btn" id="floatingFeedbackBtn" title="提交回饋">
        <i class="bi bi-chat-left-text-fill"></i>
    </button>

    <!-- 回饋提交彈出視窗 -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">
                        <i class="bi bi-chat-left-text-fill"></i> 提交回饋
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label for="feedbackStation" class="form-label">選擇車站 *</label>
                            <select class="form-select" id="feedbackStation" required>
                                <option value="">請選擇車站</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">評分 *</label>
                            <div class="rating-stars" id="ratingStars">
                                <i class="bi bi-star" data-rating="1"></i>
                                <i class="bi bi-star" data-rating="2"></i>
                                <i class="bi bi-star" data-rating="3"></i>
                                <i class="bi bi-star" data-rating="4"></i>
                                <i class="bi bi-star" data-rating="5"></i>
                            </div>
                            <input type="hidden" id="feedbackRating" required>
                            <div class="form-text">點擊星星評分 (1-5 星)</div>
                        </div>
                        <div class="mb-3">
                            <label for="passengerName" class="form-label">您的姓名 (選填)</label>
                            <input type="text" class="form-control" id="passengerName" placeholder="例如: 王小明">
                        </div>
                        <div class="mb-3">
                            <label for="feedbackComment" class="form-label">回饋內容 *</label>
                            <textarea class="form-control" id="feedbackComment" rows="4" 
                                      placeholder="請分享您對車站的意見與建議..." 
                                      maxlength="1000" required></textarea>
                            <div class="form-text">最多 1000 字</div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-send-fill"></i> 提交回饋
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- JavaScript -->
    <script src="js/feedback.js"></script>
</body>
</html>
