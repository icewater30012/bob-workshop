<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .test-cards {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .test-cards h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        .test-cards p {
            font-size: 0.85rem;
            color: #888;
            margin: 5px 0;
        }

        .transaction-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .transaction-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .transaction-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: #666;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-authorized {
            background: #fff3cd;
            color: #856404;
        }

        .badge-captured {
            background: #d4edda;
            color: #155724;
        }

        .badge-declined {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-refunded {
            background: #d6d8db;
            color: #383d41;
        }

        .transaction-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.9rem;
        }

        .transaction-details div {
            color: #666;
        }

        .transaction-details strong {
            color: #333;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .btn-capture {
            background: #28a745;
            color: white;
        }

        .btn-refund {
            background: #6c757d;
            color: white;
        }

        .btn-capture:hover, .btn-refund:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [cardNumber, setCardNumber] = useState('');
            const [expiry, setExpiry] = useState('');
            const [cvv, setCvv] = useState('');
            const [amount, setAmount] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const [loadingHistory, setLoadingHistory] = useState(false);

            useEffect(() => {
                fetchHistory();
            }, []);

            const fetchHistory = async () => {
                setLoadingHistory(true);
                try {
                    const response = await fetch('/api/payments/history');
                    const data = await response.json();
                    setTransactions(data);
                } catch (error) {
                    console.error('Error fetching history:', error);
                } finally {
                    setLoadingHistory(false);
                }
            };

            const handleAuthorize = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage(null);

                try {
                    const response = await fetch('/api/payments/authorize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cardNumber,
                            expiry,
                            cvv,
                            amount: parseFloat(amount)
                        })
                    });

                    const data = await response.json();
                    
                    if (data.status === 'AUTHORIZED') {
                        setMessage({ type: 'success', text: `Authorization successful! Transaction ID: ${data.id}` });
                        setCardNumber('');
                        setExpiry('');
                        setCvv('');
                        setAmount('');
                    } else {
                        setMessage({ type: 'error', text: `Transaction ${data.status}: ${data.responseMessage}` });
                    }
                    
                    fetchHistory();
                } catch (error) {
                    setMessage({ type: 'error', text: 'Error processing payment: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            const handleCapture = async (transactionId, amount) => {
                try {
                    const response = await fetch('/api/payments/capture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transactionId, amount })
                    });

                    if (response.ok) {
                        setMessage({ type: 'success', text: 'Capture successful!' });
                        fetchHistory();
                    } else {
                        setMessage({ type: 'error', text: 'Capture failed' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: 'Error capturing payment: ' + error.message });
                }
            };

            const handleRefund = async (transactionId, amount) => {
                try {
                    const response = await fetch('/api/payments/refund', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transactionId, amount })
                    });

                    if (response.ok) {
                        setMessage({ type: 'success', text: 'Refund successful!' });
                        fetchHistory();
                    } else {
                        setMessage({ type: 'error', text: 'Refund failed' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: 'Error refunding payment: ' + error.message });
                }
            };

            const getBadgeClass = (status) => {
                switch (status) {
                    case 'AUTHORIZED': return 'badge-authorized';
                    case 'CAPTURED': return 'badge-captured';
                    case 'DECLINED': return 'badge-declined';
                    case 'REFUNDED': return 'badge-refunded';
                    default: return '';
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>💳 Payment Processing System</h1>
                        <p>Mock Credit Card Transaction Demo</p>
                    </div>

                    {message && (
                        <div className={`alert alert-${message.type}`}>
                            {message.text}
                        </div>
                    )}

                    <div className="main-content">
                        <div className="card">
                            <h2>Process Payment</h2>
                            
                            <div className="test-cards">
                                <h3>Test Card Numbers:</h3>
                                <p>Visa: 4263970000005262</p>
                                <p>MasterCard: 5425230000004415</p>
                                <p>Amex: 374101000000608</p>
                            </div>

                            <form onSubmit={handleAuthorize}>
                                <div className="form-group">
                                    <label>Card Number</label>
                                    <input
                                        type="text"
                                        value={cardNumber}
                                        onChange={(e) => setCardNumber(e.target.value)}
                                        placeholder="4263970000005262"
                                        required
                                        pattern="\d{13,19}"
                                    />
                                </div>

                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Expiry (MM/YY)</label>
                                        <input
                                            type="text"
                                            value={expiry}
                                            onChange={(e) => setExpiry(e.target.value)}
                                            placeholder="12/25"
                                            required
                                            pattern="\d{2}/\d{2}"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label>CVV</label>
                                        <input
                                            type="text"
                                            value={cvv}
                                            onChange={(e) => setCvv(e.target.value)}
                                            placeholder="123"
                                            required
                                            pattern="\d{3,4}"
                                        />
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label>Amount ($)</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={amount}
                                        onChange={(e) => setAmount(e.target.value)}
                                        placeholder="100.00"
                                        required
                                        min="0.01"
                                    />
                                </div>

                                <button type="submit" className="btn btn-primary" disabled={loading}>
                                    {loading ? 'Processing...' : 'Authorize Payment'}
                                </button>
                            </form>
                        </div>

                        <div className="card">
                            <h2>Transaction History</h2>
                            
                            {loadingHistory ? (
                                <div className="loading">Loading transactions...</div>
                            ) : transactions.length === 0 ? (
                                <div className="empty-state">No transactions yet</div>
                            ) : (
                                <div className="transaction-list">
                                    {transactions.map((tx) => (
                                        <div key={tx.id} className="transaction-item">
                                            <div className="transaction-header">
                                                <span className="transaction-id">{tx.id}</span>
                                                <span className={`badge ${getBadgeClass(tx.status)}`}>
                                                    {tx.status}
                                                </span>
                                            </div>
                                            <div className="transaction-details">
                                                <div><strong>Card:</strong> {tx.cardNumber}</div>
                                                <div><strong>Type:</strong> {tx.cardType}</div>
                                                <div><strong>Amount:</strong> ${tx.amount}</div>
                                                <div><strong>Message:</strong> {tx.responseMessage}</div>
                                            </div>
                                            
                                            {tx.status === 'AUTHORIZED' && (
                                                <div className="action-buttons">
                                                    <button 
                                                        className="btn btn-small btn-capture"
                                                        onClick={() => handleCapture(tx.id, tx.authorizedAmount)}
                                                    >
                                                        Capture
                                                    </button>
                                                </div>
                                            )}
                                            
                                            {tx.status === 'CAPTURED' && (
                                                <div className="action-buttons">
                                                    <button 
                                                        className="btn btn-small btn-refund"
                                                        onClick={() => handleRefund(tx.id, tx.capturedAmount)}
                                                    >
                                                        Refund
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
